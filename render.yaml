services:
  # Backend Django
  - type: web
    name: software-contable-api
    runtime: python
    rootDir: backend
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: DEBUG
        value: false
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: software-contable-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: software-contable-api.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://software-contable.onrender.com
      - key: EMAIL_BACKEND
        value: django.core.mail.backends.console.EmailBackend

  # Frontend React
  - type: web
    name: software-contable
    runtime: static
    rootDir: frontend
    buildCommand: "npm install && npm run build"
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        value: https://software-contable-api.onrender.com
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: software-contable-db
    plan: free
    databaseName: software_contable
    user: admin
